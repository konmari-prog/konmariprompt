<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <meta http-equiv="refresh" content="5; url=https://konmari-prompt.pages.dev/">
  <title>KONMARI prompt は引っ越しました</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cyan: #00d4e8;
      --magenta: #ff00ff;
      --text: #2d2d2d;
      --muted: #666666;
      --bg: #fafafa;
      --line: #ececec;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background:
        linear-gradient(135deg, rgba(0, 212, 232, 0.08), rgba(255, 0, 255, 0.08)),
        var(--bg);
      color: var(--text);
      font-family: "Zen Maru Gothic", system-ui, sans-serif;
      line-height: 1.75;
    }

    main {
      width: min(720px, 100%);
      padding: clamp(32px, 7vw, 64px);
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .brand {
      margin: 0 0 16px;
      font-family: "Quicksand", system-ui, sans-serif;
      font-size: clamp(2rem, 8vw, 4rem);
      line-height: 1.05;
      letter-spacing: 0;
      background: linear-gradient(135deg, var(--cyan), var(--magenta));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    h1 {
      margin: 0 0 20px;
      font-size: clamp(1.4rem, 5vw, 2.3rem);
      line-height: 1.35;
      letter-spacing: 0;
    }

    p {
      margin: 0 auto 28px;
      max-width: 34rem;
      color: var(--muted);
      font-size: clamp(0.96rem, 2.5vw, 1.08rem);
    }

    .actions {
      display: flex;
      justify-content: center;
    }

    a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 12px 22px;
      color: #ffffff;
      background: var(--text);
      border-radius: 4px;
      font-weight: 700;
      text-decoration: none;
    }

    a:focus-visible {
      outline: 3px solid var(--cyan);
      outline-offset: 4px;
    }

  </style>
</head>
<body>
  <main>
    <p class="brand">KONMARI prompt</p>
    <h1>サイトを引っ越しました</h1>
    <p>新しいURLは https://konmari-prompt.pages.dev/ です。5秒後に自動で移動します。</p>
    <div class="actions">
      <a href="https://konmari-prompt.pages.dev/">新しいサイトを開く</a>
    </div>
  </main>
</body>
</html>
